name: Feature request
description: Suggest something Bean Counter could do better
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Tell us what you want. Don't worry about whether it's feasible —
        we'll figure that out.

  - type: textarea
    id: what
    attributes:
      label: What would you like Bean Counter to do?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why?
      description: What problem does this solve for you, or what would it make easier?

  - type: textarea
    id: when
    attributes:
      label: When does this come up?
      description: At a 3 AM feeding? While viewing the graph? When sharing with another caregiver?

  - type: textarea
    id: extras
    attributes:
      label: Anything else?
